<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Puzzle</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;background:#0a0a0f}
#app{min-height:100vh;width:100%;background:#0a0a0f;color:#e8e0d0;font-family:'Crimson Text',serif}

/* STARS */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(1px 1px at 15% 25%,rgba(255,255,255,0.25) 0%,transparent 100%),radial-gradient(1px 1px at 80% 10%,rgba(255,255,255,0.2) 0%,transparent 100%),radial-gradient(1px 1px at 50% 70%,rgba(255,255,255,0.2) 0%,transparent 100%),radial-gradient(1px 1px at 90% 55%,rgba(255,255,255,0.15) 0%,transparent 100%),radial-gradient(1px 1px at 10% 80%,rgba(255,255,255,0.18) 0%,transparent 100%),radial-gradient(1px 1px at 65% 20%,rgba(255,255,255,0.15) 0%,transparent 100%),radial-gradient(1px 1px at 35% 50%,rgba(255,255,255,0.2) 0%,transparent 100%),radial-gradient(1px 1px at 75% 85%,rgba(255,255,255,0.12) 0%,transparent 100%);background-size:500px 500px}

/* NAME SCREEN */
#name-screen{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.name-box{width:100%;max-width:480px;text-align:center}
.name-title{font-family:'Cinzel',serif;font-size:clamp(20px,4vw,30px);color:#c8a96e;margin-bottom:0.5rem;letter-spacing:0.05em}
.name-sub{font-size:16px;color:#8a7a5a;margin-bottom:2rem}
.name-input{width:100%;background:#0f0f18;border:0.5px solid #3a3020;border-radius:6px;color:#e8e0d0;font-family:'Crimson Text',serif;font-size:18px;padding:12px 16px;outline:none;text-align:center;transition:border-color 0.2s;margin-bottom:1rem}
.name-input:focus{border-color:#8a6a2a}
.name-btn{background:#8a6a2a;border:none;border-radius:6px;color:#f0e8d0;font-family:'Cinzel',serif;font-size:13px;letter-spacing:0.2em;padding:12px 32px;cursor:pointer;transition:background 0.2s;width:100%}
.name-btn:hover{background:#a07a38}

/* MAIN SCREEN */
#main-screen{display:none;position:relative;z-index:1;min-height:100vh;padding:clamp(1rem,3vw,2rem) clamp(1rem,3vw,2rem)}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:0.5rem}
.top-greeting{font-family:'Cinzel',serif;font-size:clamp(9px,1.5vw,11px);letter-spacing:0.3em;color:#8a7a5a;text-transform:uppercase}
.top-progress{font-family:'Cinzel',serif;font-size:clamp(9px,1.5vw,11px);letter-spacing:0.2em;color:#6a5a3a}
.progress-bar-wrap{height:2px;background:#1a1a28;border-radius:2px;overflow:hidden;margin-bottom:1.5rem}
.progress-bar-fill{height:100%;background:#8a6a2a;border-radius:2px;transition:width 0.6s ease}

/* PUZZLE GRID */
.puzzle-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,340px),1fr));gap:12px;margin-bottom:2rem}

/* PUZZLE CARD */
.puzzle-card{border:0.5px solid #2a2018;border-radius:8px;background:#0d0d16;overflow:hidden;transition:border-color 0.2s}
.puzzle-card:hover{border-color:#4a3a20}
.puzzle-card.solved{border-color:#3a5a3a}
.puzzle-card.locked{border-color:#1a1a2a;opacity:0.6}
.card-header{padding:0.9rem 1rem;cursor:pointer;display:flex;align-items:center;gap:10px;user-select:none}
.card-num{font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.25em;color:#6a5a3a;min-width:90px}
.card-status-dot{width:7px;height:7px;border-radius:50%;background:#2a2018;flex-shrink:0;margin-left:auto;transition:background 0.3s}
.puzzle-card.solved .card-status-dot{background:#4a8a5a}
.puzzle-card.locked .card-status-dot{background:#2a2a4a}
.card-solved-by{font-size:12px;color:#4a8a5a;font-family:'Cinzel',serif;letter-spacing:0.05em;padding:0 1rem 0.75rem;font-style:italic}
.card-body{border-top:0.5px solid #1e1a10;padding:1rem;display:none}
.card-body.open{display:block}
.card-hint{font-size:clamp(14px,2vw,16px);line-height:1.75;color:#b8a888;margin-bottom:1rem;white-space:pre-wrap}
.answer-type{font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.2em;color:#6a5a3a;margin-bottom:0.75rem;text-transform:uppercase}
.answer-revealed{font-size:15px;color:#4a8a5a;font-style:italic;padding:10px 14px;background:rgba(74,138,90,0.08);border-radius:6px;border:0.5px solid #3a5a3a}
.input-row{display:flex;gap:8px}
.pass-input{flex:1;min-width:0;background:#0a0a12;border:0.5px solid #3a3020;border-radius:6px;color:#e8e0d0;font-family:'Crimson Text',serif;font-size:16px;padding:9px 13px;outline:none;transition:border-color 0.2s}
.pass-input:focus{border-color:#8a6a2a}
.pass-input.error{border-color:#8a3a2a;animation:shake 0.3s ease}
.pass-input.ok{border-color:#3a8a5a}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.submit-btn{background:#8a6a2a;border:none;border-radius:6px;color:#f0e8d0;font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.15em;padding:9px 16px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background 0.2s}
.submit-btn:hover{background:#a07a38}
.submit-btn:disabled{background:#2a2018;color:#6a5a3a;cursor:not-allowed}
.card-status-msg{font-size:13px;min-height:18px;margin-top:0.6rem;text-align:center}
.card-status-msg.err{color:#c86a5a}
.card-status-msg.ok{color:#5ab87a}
.card-status-msg.loading{color:#8a6a2a}

/* LOCK CARD */
.lock-notice{text-align:center;padding:1rem;color:#4a4a6a;font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.2em}
.lock-icon{font-size:20px;margin-bottom:0.5rem;opacity:0.4}

.divider{display:flex;align-items:center;gap:12px;margin:1rem 0}
.divider-line{flex:1;height:0.5px;background:#2a2018}
.divider-diamond{width:5px;height:5px;flex-shrink:0;background:#6a5a2a;transform:rotate(45deg)}
</style>
</head>
<body>
<div id="app">
  <div class="stars"></div>

  <!-- NAME ENTRY -->
  <div id="name-screen">
    <div class="name-box">
      <div class="name-title">Enter Your Name</div>
      <div class="name-sub">Your name will appear when you solve a puzzle.</div>
      <input class="name-input" id="name-input" type="text" placeholder="Your name..." autocomplete="off" maxlength="40"/>
      <button class="name-btn" id="name-btn">Begin</button>
    </div>
  </div>

  <!-- MAIN PUZZLE SCREEN -->
  <div id="main-screen">
    <div class="top-bar">
      <div class="top-greeting" id="top-greeting"></div>
      <div class="top-progress" id="top-progress">0 / 16 solved</div>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="puzzle-grid" id="puzzle-grid"></div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://adqnhmmgrrptiljuvnwv.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkcW5obW1ncnJwdGlsanV2bnd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MDIzNzMsImV4cCI6MjA4OTM3ODM3M30.k_pxMDRvOtBasUgqk-THJmY3GoJ0Ppgdg5ZhK2pQ4UE";

const PUZZLES = [
  {
    id: 1,
    hint: `This film, though difficult to spot while watching, has 3 shots reusing the exact same frame, albeit with the background swapped or shot reversed. It is also the film in which the main character vanishes from the screen at 1:25:17.`,
    type: "Series / Character name"
  },
  {
    id: 2,
    hint: `The emerald eye at it's origin, stories of chocolate at it's nexus, I have a living snare as a cousin though youngsters shout my name.\nThis answer is the name of a book (series)`,
    type: "Series / Character name"
  },
  {
    id: 3,
    hint: `Mr. Mullen may sing "Ice, Ice, Baby" (my fucking god), but I prefer Ice Up!`,
    type: "Character"
  },
  {
    id: 4,
    hint: `Though I am hated by many, I am loved by the ones who support *girls*.\nAnd even after all my attempts to fix my way,\nI was overruled, by the father of one who tells me\nThat "I miss you, I'm sorry"\n[Fun Fact: Due to that unnamed director, I had to film my final lines of rewrites in my closet!]\n\nHint from your friendly neighborhood DM: The first line refers to a TV Show while the next 3 refer to a film.`,
    type: "Name, Actor"
  },
  {
    id: 5,
    hint: `Not many are offered a second life,\nThough for Wade, a quarter from this is all it takes,\nBut for you my friend,\nThe answer can be found,\nIn the 16th passage.\n\nHint: Parzival may be a big shot, but maybe think further...\nMaybe... a small-town boy?`,
    type: "Sentence"
  },
  {
    id: 6,
    hint: `I speak of a master of illusions,\nOf a broken soul,\nOf a creature curled up in their shell.\n\nI speak of sins,\nand I speak of rot,\nWhat am I, a venter for your sins?\n\nHint: Last line exists to sound nice (Ignore it).`,
    type: "Song"
  },
  {
    id: 7,
    hint: `Five? What's next, 6, 7?\n(Karma not impressed)`,
    type: "Character"
  },
  {
    id: 8,
    hint: `Though they share our planet's name,\nThey do not bow before any as they remain-Perched upon moonstone,\nSat, high up upon the morning throne.\n-7th Century PCE`,
    type: "Character"
  },
  {
    id: 9,
    hint: `Had the fuhrer succeeded, he would have only mimicked a *fraction* of my fabled German spider-web, weaving together a true state. (Dirty Austrian).\n(Absolute aura)`,
    type: "Historical Figure"
  },
  {
    id: 10,
    hint: `An arrogant mother,\nOf otherworldly prowess,\nIs the same,\nAs,\nA man of true steel,\nA failed Theologian, (how tf do you fail that)\nA masked man with a pistol in a heist.\n\nHint: The first 3 phrases refer to one person, the second another. Both people share the same name.`,
    type: "Person"
  },
  {
    id: 11,
    hint: `Though Selena Hale may have sacrificed,\nOne who shares her name loses more.\nHer parents, sparks of Hatred perhaps never to be found,\nHer friends, Grey never to be recovered.\n\nBut who is the greatest of them all, the one she cannot lose?`,
    type: "Character (no type label)"
  },
  {
    id: 12,
    hint: `Though the Enchantress of ancient tales attempts to harm us,\nThough the Grande Armee decides to find us,\nThough the man under the scary mask decides to hunt us,\nWe prevail, an author's odyssey behind us.`,
    type: "The name of two characters who share a last name, in format [Name1, Name2] (with the comma) (eldest first)"
  },
  {
    id: 13,
    hint: `Though the Alroy may share my name,\nThey will never share my pain.\nDaughter, Heir, Princess, Queen,\nThey will never match the Kejari, unseen.`,
    type: "Character (Full name required)"
  },
  {
    id: 14,
    hint: `Though striking gray may meet piercing blue,\nI can never endorse reading you.\nThrough the ages and through the pain,\nA red queen reigns above all aims.`,
    type: "Series name"
  },
  {
    id: 15,
    hint: `Though the world cannot easily be summoned,\nClara may try, as she may be destined.\nThough Kaelis may attempt to fool her fortunes,\nShe knows who he is, and will not be denied her portion.`,
    type: "Book name"
  },
  {
    id: 16,
    hint: `Oh to be the sacred number of the universe\nWhat a shame, what a shame.\nBecause you are not.`,
    type: "?"
  }
];

function getSessionId() {
  let sid = localStorage.getItem('puzzle_session_v2');
  if (!sid) { sid = 'sess_' + Math.random().toString(36).slice(2) + Date.now().toString(36); localStorage.setItem('puzzle_session_v2', sid); }
  return sid;
}

function getPlayerName() { return localStorage.getItem('puzzle_name_v2') || ''; }
function setPlayerName(n) { localStorage.setItem('puzzle_name_v2', n); }

const sessionId = getSessionId();
let playerName = getPlayerName();
let puzzleStates = {}; // id -> {solved_by_name, solved_at} or null
let openCards = new Set();

async function headers() {
  return { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json' };
}

async function fetchStates() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/puzzle_status?select=id,solved_by_name,solved_at`, { headers: await headers() });
  const rows = await res.json();
  const newStates = {};
  rows.forEach(r => { newStates[r.id] = r.solved_by_name ? { name: r.solved_by_name, at: r.solved_at } : null; });
  return newStates;
}

async function registerPlayer() {
  await fetch(`${SUPABASE_URL}/rest/v1/players`, {
    method: 'POST',
    headers: { ...await headers(), 'Prefer': 'resolution=ignore-duplicates' },
    body: JSON.stringify({ session_id: sessionId, name: playerName })
  });
}

async function submitAnswer(puzzleId, attempt) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/check_puzzle_answer`, {
    method: 'POST',
    headers: await headers(),
    body: JSON.stringify({ p_puzzle_id: puzzleId, p_attempt: attempt, p_session_id: sessionId, p_player_name: playerName })
  });
  return await res.json();
}

function countSolved(states) {
  return Object.values(states).filter(v => v !== null).length;
}

function allOthersSolved(states) {
  for (let i = 1; i <= 15; i++) { if (!states[i]) return false; }
  return true;
}

function ordinal(n) {
  const s = ['th','st','nd','rd'], v = n % 100;
  return n + (s[(v-20)%10] || s[v] || s[0]);
}

function renderGrid(states) {
  const grid = document.getElementById('puzzle-grid');
  const solved = countSolved(states);
  document.getElementById('top-progress').textContent = solved + ' / 16 solved';
  document.getElementById('prog-fill').style.width = (solved / 16 * 100) + '%';

  // Re-render each card if it exists, or build fresh
  PUZZLES.forEach(p => {
    let card = document.getElementById('card-' + p.id);
    const state = states[p.id];
    const isLocked = p.id === 16 && !allOthersSolved(states);
    const isSolved = !!state;
    const isOpen = openCards.has(p.id);

    if (!card) {
      card = document.createElement('div');
      card.id = 'card-' + p.id;
      grid.appendChild(card);
    }

    card.className = 'puzzle-card' + (isSolved ? ' solved' : '') + (isLocked ? ' locked' : '');

    let bodyHTML = '';
    if (isLocked) {
      bodyHTML = `
        <div class="card-body${isOpen ? ' open' : ''}">
          <div class="lock-notice"><div class="lock-icon">🔒</div>Solve all other puzzles to unlock.</div>
        </div>`;
    } else if (isSolved) {
      bodyHTML = `
        <div class="card-body${isOpen ? ' open' : ''}">
          <div class="answer-type">Answer Type: ${p.type}</div>
          <div class="card-hint">${p.hint}</div>
          <div class="answer-revealed">✓ ${state.name}</div>
        </div>`;
    } else {
      bodyHTML = `
        <div class="card-body${isOpen ? ' open' : ''}" id="body-${p.id}">
          <div class="answer-type">Answer Type: ${p.type}</div>
          <div class="card-hint">${p.hint}</div>
          <div class="input-row">
            <input class="pass-input" id="inp-${p.id}" type="text" placeholder="Your answer..." autocomplete="off" spellcheck="false"/>
            <button class="submit-btn" id="btn-${p.id}" onclick="doSubmit(${p.id})">Submit</button>
          </div>
          <div class="card-status-msg" id="msg-${p.id}"></div>
        </div>`;
    }

    card.innerHTML = `
      <div class="card-header" onclick="toggleCard(${p.id})">
        <div class="card-num">${ordinal(p.id)} Puzzle</div>
        <div class="card-status-dot"></div>
      </div>
      ${isSolved ? `<div class="card-solved-by">Solved by ${state.name}</div>` : ''}
      ${bodyHTML}`;

    if (!isSolved && !isLocked) {
      const inp = document.getElementById('inp-' + p.id);
      if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') doSubmit(p.id); });
    }
  });
}

function toggleCard(id) {
  if (openCards.has(id)) openCards.delete(id);
  else openCards.add(id);
  const body = document.getElementById('card-' + id)?.querySelector('.card-body');
  if (body) body.classList.toggle('open', openCards.has(id));
}

async function doSubmit(puzzleId) {
  const inp = document.getElementById('inp-' + puzzleId);
  const btn = document.getElementById('btn-' + puzzleId);
  const msg = document.getElementById('msg-' + puzzleId);
  const attempt = inp.value.trim();
  if (!attempt) return;
  btn.disabled = true;
  inp.classList.remove('error', 'ok');
  msg.className = 'card-status-msg loading';
  msg.textContent = 'Checking...';
  try {
    const result = await submitAnswer(puzzleId, attempt);
    if (result && result.success) {
      inp.classList.add('ok');
      msg.className = 'card-status-msg ok';
      msg.textContent = '✦ Correct!';
      await refreshStates();
    } else {
      inp.classList.add('error');
      msg.className = 'card-status-msg err';
      msg.textContent = (result && result.message) || 'Incorrect.';
      setTimeout(() => inp.classList.remove('error'), 500);
      btn.disabled = false;
    }
  } catch(e) {
    msg.className = 'card-status-msg err';
    msg.textContent = 'Connection error. Try again.';
    btn.disabled = false;
  }
}

async function refreshStates() {
  const newStates = await fetchStates();
  puzzleStates = newStates;
  renderGrid(puzzleStates);
}

function startPolling() {
  setInterval(async () => {
    const newStates = await fetchStates();
    // Only re-render if something changed
    const changed = PUZZLES.some(p => {
      const was = puzzleStates[p.id];
      const now = newStates[p.id];
      return (!!was) !== (!!now) || (was && now && was.name !== now.name);
    });
    if (changed) {
      puzzleStates = newStates;
      renderGrid(puzzleStates);
    }
  }, 5000);
}

// NAME SCREEN LOGIC
document.getElementById('name-btn').addEventListener('click', beginSession);
document.getElementById('name-input').addEventListener('keydown', e => { if (e.key === 'Enter') beginSession(); });

async function beginSession() {
  const val = document.getElementById('name-input').value.trim();
  if (!val) return;
  setPlayerName(val);
  playerName = val;
  await registerPlayer();
  document.getElementById('name-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'block';
  document.getElementById('top-greeting').textContent = playerName;
  puzzleStates = await fetchStates();
  renderGrid(puzzleStates);
  startPolling();
}

async function init() {
  if (playerName) {
    document.getElementById('name-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    document.getElementById('top-greeting').textContent = playerName;
    await registerPlayer();
    puzzleStates = await fetchStates();
    renderGrid(puzzleStates);
    startPolling();
  } else {
    document.getElementById('name-input').focus();
  }
}

init();
</script>
</body>
</html>
