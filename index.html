<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Evan's Random Ass Puzzle #1</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%}
body{background:#0a0a0f}
#app{min-height:100vh;width:100%;background:#0a0a0f;color:#e8e0d0;font-family:'Crimson Text',serif;position:relative}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(1px 1px at 20% 30%,rgba(255,255,255,0.3) 0%,transparent 100%),radial-gradient(1px 1px at 80% 10%,rgba(255,255,255,0.2) 0%,transparent 100%),radial-gradient(1px 1px at 50% 70%,rgba(255,255,255,0.25) 0%,transparent 100%),radial-gradient(1px 1px at 90% 60%,rgba(255,255,255,0.15) 0%,transparent 100%),radial-gradient(1px 1px at 10% 80%,rgba(255,255,255,0.2) 0%,transparent 100%),radial-gradient(1px 1px at 65% 20%,rgba(255,255,255,0.18) 0%,transparent 100%),radial-gradient(1px 1px at 35% 50%,rgba(255,255,255,0.22) 0%,transparent 100%),radial-gradient(1px 1px at 75% 85%,rgba(255,255,255,0.12) 0%,transparent 100%);background-size:400px 400px}
.wrap{position:relative;z-index:1;padding:clamp(1.25rem,4vw,2.5rem) clamp(1rem,4vw,2rem);width:100%;max-width:860px;margin:0 auto}
.site-title{font-family:'Cinzel',serif;font-size:clamp(9px,1.5vw,11px);letter-spacing:0.4em;text-transform:uppercase;color:#8a7a5a;text-align:center;margin-bottom:0.5rem}
.puzzle-screen{display:none;width:100%}
.puzzle-screen.active{display:block}
.puzzle-num{font-family:'Cinzel',serif;font-size:clamp(9px,1.5vw,10px);letter-spacing:0.35em;color:#6a5a3a;text-align:center;margin-bottom:0.75rem}
.puzzle-title{font-family:'Cinzel',serif;font-size:clamp(17px,3.5vw,24px);font-weight:700;color:#c8a96e;text-align:center;margin-bottom:1.25rem;line-height:1.3}
.divider{display:flex;align-items:center;gap:12px;margin:1rem 0}
.divider-line{flex:1;height:0.5px;background:#3a3020}
.divider-diamond{width:6px;height:6px;flex-shrink:0;background:#8a6a2a;transform:rotate(45deg)}
.hint-box{border:0.5px solid #3a3020;border-left:2px solid #8a6a2a;border-radius:0 6px 6px 0;padding:clamp(0.75rem,2vw,1rem) clamp(0.9rem,2vw,1.25rem);background:rgba(138,106,42,0.06);font-size:clamp(15px,2.2vw,17px);line-height:1.7;color:#b8a888;margin-bottom:1.25rem}
.input-row{display:flex;gap:8px;align-items:stretch;margin-bottom:0.75rem;width:100%}
.pass-input{flex:1;min-width:0;background:#0f0f18;border:0.5px solid #3a3020;border-radius:6px;color:#e8e0d0;font-family:'Crimson Text',serif;font-size:clamp(15px,2vw,17px);padding:10px 14px;outline:none;transition:border-color 0.2s}
.pass-input:focus{border-color:#8a6a2a}
.pass-input.error{border-color:#8a3a2a;animation:shake 0.3s ease}
.pass-input.success{border-color:#3a8a5a}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.submit-btn{background:#8a6a2a;border:none;border-radius:6px;color:#f0e8d0;font-family:'Cinzel',serif;font-size:clamp(10px,1.5vw,12px);letter-spacing:0.15em;padding:10px clamp(12px,2vw,20px);cursor:pointer;transition:background 0.2s,transform 0.1s;white-space:nowrap;flex-shrink:0}
.submit-btn:hover{background:#a07a38}
.submit-btn:active{transform:scale(0.97)}
.submit-btn:disabled{background:#3a3020;color:#6a5a3a;cursor:not-allowed}
.status-msg{font-size:clamp(13px,1.8vw,14px);min-height:20px;text-align:center;transition:opacity 0.3s}
.status-msg.err{color:#c86a5a}
.status-msg.ok{color:#5ab87a}
.status-msg.loading{color:#8a6a2a}
.progress-bar-wrap{margin:1.25rem 0 0.4rem;height:2px;background:#1a1a28;border-radius:2px;overflow:hidden}
.progress-bar-fill{height:100%;background:#8a6a2a;border-radius:2px;transition:width 0.6s ease}
.progress-label{font-size:clamp(10px,1.5vw,12px);color:#6a5a3a;text-align:right;font-family:'Cinzel',serif;letter-spacing:0.1em}
.victory-screen{display:none;text-align:center;padding:2rem 0}
.victory-screen.active{display:block}
.victory-glyph{font-size:clamp(32px,6vw,48px);margin-bottom:1rem;color:#c8a96e;font-family:'Cinzel',serif}
.victory-title{font-family:'Cinzel',serif;font-size:clamp(16px,3vw,22px);color:#c8a96e;margin-bottom:0.75rem}
.victory-sub{color:#8a7a5a;font-size:clamp(14px,2vw,16px);line-height:1.7}
.nav-row{display:flex;justify-content:center;align-items:center;margin-top:1.5rem}
.nav-dots{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.nav-dot{width:6px;height:6px;border-radius:50%;background:#2a2018;transition:background 0.3s;flex-shrink:0}
.nav-dot.done{background:#8a6a2a}
.nav-dot.current{background:#c8a96e}
.session-note{font-size:clamp(10px,1.5vw,12px);color:#4a4030;text-align:center;margin-top:1.25rem;letter-spacing:0.05em;word-break:break-all}
</style>
</head>
<body>
<div id="app">
  <div class="stars"></div>
  <div class="wrap">

    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="progress-label" id="prog-label">0 / 10</div>
    <div class="divider"><div class="divider-line"></div><div class="divider-diamond"></div><div class="divider-line"></div></div>
    <div id="puzzles-container"></div>
    <div class="victory-screen" id="victory">
      <div class="victory-glyph">✦</div>
      <div class="victory-title">All puzzles solved.</div>
      <div class="divider"><div class="divider-line"></div><div class="divider-diamond"></div><div class="divider-line"></div></div>
      <div class="victory-sub">You have walked the full path.<br>The archive is yours.</div>
    </div>
    <div class="nav-row"><div class="nav-dots" id="nav-dots"></div></div>
    <div class="session-note" id="session-note"></div>
  </div>
</div>

<script>
const SUPABASE_URL="https://adqnhmmgrrptiljuvnwv.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkcW5obW1ncnJwdGlsanV2bnd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MDIzNzMsImV4cCI6MjA4OTM3ODM3M30.k_pxMDRvOtBasUgqk-THJmY3GoJ0Ppgdg5ZhK2pQ4UE";

const PUZZLES=[
  {id:1,  title:"The Cure?",              hint:"Navarrian scientists say that <em>the cure</em> to Venin could be found within the siphon signet. However, I digress. The true cure may be referenced in the 27th line of the tome itself."},
  {id:2,  title:"Glimpses of Tomorrow",   hint:"The passphrase waits where glimpses of tomorrow are displayed."},
  {id:3,  title:"The Villain's Identity", hint:"&ldquo;You either die a hero, or live long enough to see yourself become the villian&rdquo; were once the closing lines of my story, but the story of my enforcer counterpart is very different. His true identity shares it&rsquo;s last with the name of whose face will lead you on. HINT: DO NOT use the Honor Site for this"},
  {id:4,  title:"Like Coins",             hint:"You already have the hint to this riddle... Refer to your previous response and simply... continue (do not start your answer with a space)"},
  {id:5,  title:"Invested Arts",          hint:"Many of the Invested Arts naturally have the ability to detect [] built into them."},
  {id:6,  title:"The Gauntlet's Secret",  hint:"This, the biggest clue held by generations, was held in the Gauntlet, hidden in Ireland."},
  {id:7,  title:"Top of the Charts",      hint:"What was Evan's 2025 top Spotify song? (Lmao)"},
  {id:8,  title:"The Origin",             hint:"The origin. 2023-10-27 3:35 PM This response is case sensitive"},
  {id:9,  title:"Did You See That?",      hint:"Challenge me, challenge this, but did you see that?"},
  {id:10, title:"The Haunting",           hint:"The sound of the ghost drags... but with this, the effect is eerie."}
];

function getSessionId(){
  let sid=localStorage.getItem('gauntlet_session');
  if(!sid){sid='sess_'+Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem('gauntlet_session',sid);}
  return sid;
}

let sessionId=getSessionId(),currentPuzzle=1,completedPuzzles=[];

async function fetchProgress(){
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/puzzle_progress?session_id=eq.${encodeURIComponent(sessionId)}&select=current_puzzle,completed_puzzles`,{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
    if(res.ok){const d=await res.json();if(d&&d[0]){currentPuzzle=d[0].current_puzzle||1;completedPuzzles=d[0].completed_puzzles||[];}}
  }catch(e){}
}

async function checkPassword(pid,attempt){
  const res=await fetch(`${SUPABASE_URL}/rest/v1/rpc/check_puzzle_password`,{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY},body:JSON.stringify({p_puzzle_id:pid,p_attempt:attempt,p_session_id:sessionId})});
  if(!res.ok)throw new Error('Network error');
  return await res.json();
}

function buildPuzzles(){
  const c=document.getElementById('puzzles-container');
  c.innerHTML='';
  PUZZLES.forEach(p=>{
    const div=document.createElement('div');
    div.className='puzzle-screen'+(p.id===currentPuzzle?' active':'');
    div.id='puzzle-'+p.id;
    div.innerHTML=`<div class="puzzle-num">Puzzle ${p.id} of 10</div><div class="puzzle-title">${p.title}</div><div class="hint-box">${p.hint}</div><div class="input-row"><input class="pass-input" type="text" id="inp-${p.id}" placeholder="Enter the passphrase..." autocomplete="off" spellcheck="false"/><button class="submit-btn" id="btn-${p.id}" onclick="submitPuzzle(${p.id})">Unlock</button></div><div class="status-msg" id="status-${p.id}"></div>`;
    c.appendChild(div);
    div.querySelector(`#inp-${p.id}`).addEventListener('keydown',e=>{if(e.key==='Enter')submitPuzzle(p.id);});
  });
}

function buildDots(){
  const el=document.getElementById('nav-dots');
  el.innerHTML='';
  for(let i=1;i<=10;i++){
    const d=document.createElement('div');
    d.className='nav-dot'+(completedPuzzles.includes(i)?' done':'')+(i===currentPuzzle&&currentPuzzle<=10?' current':'');
    el.appendChild(d);
  }
}

function updateProgress(){
  const done=completedPuzzles.length;
  document.getElementById('prog-fill').style.width=(done/10*100)+'%';
  document.getElementById('prog-label').textContent=done+' / 10';
}

function showScreen(id){
  document.querySelectorAll('.puzzle-screen').forEach(el=>el.classList.remove('active'));
  const t=document.getElementById('puzzle-'+id);
  if(t)t.classList.add('active');
  document.getElementById('victory').classList.remove('active');
}

function showVictory(){
  document.querySelectorAll('.puzzle-screen').forEach(el=>el.classList.remove('active'));
  document.getElementById('victory').classList.add('active');
}

async function submitPuzzle(pid){
  const inp=document.getElementById('inp-'+pid);
  const btn=document.getElementById('btn-'+pid);
  const status=document.getElementById('status-'+pid);
  const attempt=inp.value;
  if(!attempt.trim())return;
  btn.disabled=true;
  inp.classList.remove('error','success');
  status.className='status-msg loading';
  status.textContent='Checking...';
  try{
    const result=await checkPassword(pid,attempt);
    if(result&&result.success){
      inp.classList.add('success');
      status.className='status-msg ok';
      status.textContent=result.completed?'✦ All puzzles solved.':'✦ Correct. Advancing...';
      if(!completedPuzzles.includes(pid))completedPuzzles.push(pid);
      currentPuzzle=result.next_puzzle;
      updateProgress();buildDots();
      setTimeout(()=>{
        if(result.completed||currentPuzzle>10)showVictory();
        else{showScreen(currentPuzzle);const ni=document.getElementById('inp-'+currentPuzzle);if(ni)ni.focus();}
        btn.disabled=false;
      },900);
    }else{
      inp.classList.add('error');
      status.className='status-msg err';
      status.textContent='Incorrect. Try again.';
      btn.disabled=false;
      setTimeout(()=>inp.classList.remove('error'),500);
    }
  }catch(e){
    status.className='status-msg err';
    status.textContent='Connection lost. Try again.';
    btn.disabled=false;
  }
}

async function init(){
  document.getElementById('session-note').textContent='Session: '+sessionId.slice(0,16)+'...';
  await fetchProgress();
  buildPuzzles();buildDots();updateProgress();
  if(currentPuzzle>10||completedPuzzles.length>=10)showVictory();
  else{showScreen(currentPuzzle);const inp=document.getElementById('inp-'+currentPuzzle);if(inp)inp.focus();}
}

init();
</script>
</body>
</html>
